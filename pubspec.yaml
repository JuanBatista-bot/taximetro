    class SettingsPage extends StatefulWidget {
    @override
    _SettingsPageState createState() => _SettingsPageState();
  }

    class _SettingsPageState extends State<SettingsPage> {
    final TaximeterProvider provider = TaximeterProvider();
    late TextEditingController baseCtrl, mileCtrl, waitCtrl;
    
    @override
    void initState() {
    super.initState();
  baseCtrl = TextEditingController(text: provider.fareBase.toStringAsFixed(2));
  mileCtrl = TextEditingController(text: provider.farePerMile.toStringAsFixed(2));
  waitCtrl = TextEditingController(text: provider.farePerMinuteWait.toStringAsFixed(2));
  }

    @override
    Widget build(BuildContext context) {
    return Scaffold(
  appBar: AppBar(title: Text('Ajustes')),
  body: Padding(
    padding: const EdgeInsets.all(16.0),
    child: Column(
      children: [
        TextField(
        controller: baseCtrl,
        keyboardType: TextInputType.numberWithOptions(decimal: true),
        decoration: InputDecoration(labelText: 'Banderazo (\$)'),
        onChanged: (val) {
                           double? v = double.tryParse(val);
                           if (v != null) provider.fareBase = v;
        },
        ),
        TextField(
        controller: mileCtrl,
        keyboardType: TextInputType.numberWithOptions(decimal: true),
        decoration: InputDecoration(labelText: 'Por milla (\$)'),
        onChanged: (val) {
                           double? v = double.tryParse(val);
                           if (v != null) provider.farePerMile = v;
        },
        ),
        TextField(
        controller: waitCtrl,
        keyboardType: TextInputType.numberWithOptions(decimal: true),
        decoration: InputDecoration(labelText: 'Espera por min (\$)'),
        onChanged: (val) {
                           double? v = double.tryParse(val);
                           if (v != null) provider.farePerMinuteWait = v;
        },
        ),
        SizedBox(height: 20),
        ElevatedButton(
        onPressed: () {
                        provider.updateFares(
                        double.tryParse(baseCtrl.text) ?? provider.fareBase,
                        double.tryParse(mileCtrl.text) ?? provider.farePerMile,
                        double.tryParse(waitCtrl.text) ?? provider.farePerMinuteWait,
                        );
                        ScaffoldMessenger.of(context).showSnackBar(
          SnackBar(content: Text('Tarifas guardadas')),
                        );
        },
        child: Text('Guardar tarifas'),
        ),
        Divider(height: 30),
        ElevatedButton(
        onPressed: () {
                        provider.clearHistory();
                        ScaffoldMessenger.of(context).showSnackBar(
          SnackBar(content: Text('Historial borrado')),
                        );
        },
        child: Text('Borrar historial'),
        style: ElevatedButton.styleFrom(backgroundColor: Colors.red),
        ),
      ],
    ),
    ),
    );
  }
  }

    // Helper para AnimatedBuilder (simplifica la escucha)
    class AnimatedBuilder extends StatelessWidget {
    final TaximeterProvider animation;
    final Widget Function(BuildContext, Widget?) builder;
    const AnimatedBuilder({required this.animation, required this.builder});
    @override
    Widget build(BuildContext context) {
    return ListenableBuilder(
  listenable: animation,
  builder: (context, child) => builder(context, child),
    );
  }
  }