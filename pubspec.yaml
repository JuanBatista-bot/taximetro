              onPressed: provider.isActive ? null : () => provider.startTrip(),
            child: Text('Iniciar'),
            ),
            ),
            SizedBox(width: 10),
            Expanded(
            child: ElevatedButton(
              onPressed: !provider.isActive ? null : () => provider.stopTrip(),
              child: Text('Finalizar'),
            ),
            ),
          ],
          ),
          SizedBox(height: 20),
          Text('Distancia: ${provider.distanceMiles.toStringAsFixed(2)} millas'),
          Text('Tiempo de espera: ${provider.waitMinutes.toStringAsFixed(2)} min'),
          Text('Total: \$${provider.totalFare.toStringAsFixed(2)}',
                  style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold)),
              Divider(height: 30),
              Text('Historial de viajes', style: TextStyle(fontWeight: FontWeight.bold)),
          Expanded(
          child: ListView.builder(
            itemCount: provider.allTrips.length,
          itemBuilder: (context, index) {
                                          final trip = provider.allTrips[index];
                                          return ListTile(
