            subtitle: Text(
                        '${trip.distanceMiles.toStringAsFixed(2)} mi, ${trip.waitMinutes.toStringAsFixed(1)} min espera',
                                          ),
            trailing: Text('\$${trip.totalFare.toStringAsFixed(2)}'),
                    );
                  },
                ),
              ),
              ElevatedButton.icon(
                onPressed: provider.allTrips.isEmpty
                    ? null
                    : () async {
                        String path = await provider.exportCsv();
                        await Share.shareXFiles([XFile(path)], text: 'Historial taxímetro');
          },
          icon: Icon(Icons.share),
          label: Text('Exportar CSV'),
          ),
